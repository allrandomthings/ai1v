# cog.yaml
build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "ffmpeg"
  python_version: "3.11"
  python_packages:
    - "torch==2.5.1"
    - "torchvision==0.20.1"
    - "numpy"
    - "transformers"
    - "accelerate"
    - "sentencepiece"
    - "Pillow"
    - "imageio==2.36.1"
    - "imageio-ffmpeg==0.5.1"
    - "requests"
    - "peft"
    - "protobuf"
  run:
    - "pip install git+https://github.com/huggingface/diffusers.git"
    - "pip install 'huggingface-hub==0.26.2'"

predict: "predict.py:Predictor"
